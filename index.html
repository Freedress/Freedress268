<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤩60分鐘深層經絡煥活SPA</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #fff7ed;
  color: #333;
}

/* 容器 */
.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
}

/* 卡片 */
.card {
  background: #ffffff;
  border-radius: 20px;
  padding: 20px;
  margin-top: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.title {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 10px;
}

.price-old {
  text-decoration: line-through;
  opacity: 0.6;
}

.price-new {
  font-size: 32px;
  font-weight: bold;
  color: #e11d48;
}

.highlight {
  color: #f59e0b;
  font-weight: bold;
}

/* 按鈕 */
.button {
  display: block;
  width: 100%;
  padding: 15px;
  border-radius: 14px;
  border: none;
  background: #25D366;
  color: white;
  font-size: 16px;
  font-weight: bold;
  margin-top: 15px;
  cursor: pointer;
}

/* 移除所有 a 的藍線 */
a {
  text-decoration: none;
  color: inherit;
}
a img {
  border: none;
  display: block;
}

/* 圖片 */
img {
  width: 100%;
  display: block;
  margin: 0;
  border-radius: 0;
}

/* 圓角 */
.top-rounded {
  border-top-left-radius: 20px;
  border-top-right-radius: 20px;
}
.bottom-rounded {
  border-bottom-left-radius: 20px;
  border-bottom-right-radius: 20px;
  margin-bottom: 20px;
}
</style>

</head>

<body>

<div class="container">

  <!-- 頂部圖片 -->
  <img src="banner.jpg" class="top-rounded">
  <img src="banner1.jpg">
  <img src="banner2.jpg">
  <img src="banner3.jpg">

  <!-- 卡片 -->
  <div class="card">
    <div class="title">🤩60分鐘深層經絡煥活SPA</div>
    <p>🌿 前45分鐘｜深層經絡疏通</p>
    <p>逐條經絡打開，將積咗十年嘅疲勞物質釋放返出嚟</p> 
    
    <div class="title">🌙 後15分鐘｜溫和刮痧淨化</div>
    <p>精準刮拭，帶走深層廢物，還原身體應有嘅輕盈</p>
  </div>

  <div class="card">
    <div class="title">🔥 限時優惠</div>
    <p class="price-old">原價$688</p>
    <p class="price-new">$268</p>
    <p class="highlight">📍荔枝角・鑽石山・北角</p>

    <div class="title">🔥🔥即刻開始身體放鬆之旅</div>

    <!-- WhatsApp 按鈕（原位置） -->
    <a href="https://wa.me/85251675936" target="_blank" rel="noopener noreferrer" id="whatsappBtn">
      <button class="button">📱 立即領取優惠(WhatsApp)</button>
    </a>
  </div>

</div>

<script>
console.log("✅ 页面已加载完成");

document.querySelectorAll("img").forEach((img, index) => {
  img.addEventListener("load", () => {
    console.log(`🖼️ 图片${index + 1}加载成功: ${img.src}`);
  });
  img.addEventListener("error", () => {
    console.error(`❌ 图片${index + 1}加载失败: ${img.src}`);
  });
});

const btn = document.getElementById("whatsappBtn");
if (btn) {
  btn.addEventListener("click", () => {
    console.log("📲 用户点击了 WhatsApp 按钮");
  });
}
</script>

</body>
</html>
